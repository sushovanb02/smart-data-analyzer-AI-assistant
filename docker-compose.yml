version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: streamlit_ui
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - .:/app
    environment:
      - API_URL=http://backend:8000
    restart: always

volumes:
  ollama_data: